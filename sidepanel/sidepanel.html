<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>See it as an LLM</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header>
    <h1>See it as an LLM</h1>
    <p class="domain-label" id="domainLabel">—</p>
  </header>

  <section class="section">
    <h2>Fetch as LLM</h2>

    <label class="field-label" for="acceptHeader">Accept header</label>
    <input
      type="text"
      id="acceptHeader"
      class="text-input"
      value="text/markdown, text/html"
      spellcheck="false"
    >

    <label class="field-label" for="userAgentSelect">User-Agent</label>
    <div class="ua-row">
      <select id="userAgentSelect" class="select-input">
        <option value="ChatGPT-User">ChatGPT-User</option>
        <option value="ClaudeBot/1.0">ClaudeBot</option>
        <option value="Google-Extended">Google-Extended</option>
        <option value="PerplexityBot/1.0">PerplexityBot</option>
        <option value="custom">Custom...</option>
      </select>
    </div>
    <input
      type="text"
      id="userAgentCustom"
      class="text-input ua-custom hidden"
      placeholder="Enter custom User-Agent..."
      spellcheck="false"
    >

    <button id="fetchBtn" class="btn-primary">Fetch</button>
    <div id="status" class="status hidden"></div>
  </section>

  <section class="section">
    <h2>Render Options</h2>

    <div class="toggle-row">
      <span class="toggle-label">Render Markdown</span>
      <label class="switch">
        <input type="checkbox" id="toggleRenderMarkdown" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Show Frontmatter</span>
      <label class="switch">
        <input type="checkbox" id="toggleFrontmatter" checked>
        <span class="slider"></span>
      </label>
    </div>
  </section>

  <section class="section">
    <h2>Site Controls</h2>

    <div class="toggle-row">
      <span class="toggle-label">Block Cookies</span>
      <label class="switch">
        <input type="checkbox" id="toggleCookies">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Block localStorage</span>
      <label class="switch">
        <input type="checkbox" id="toggleLocalStorage">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Block sessionStorage</span>
      <label class="switch">
        <input type="checkbox" id="toggleSessionStorage">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Block JavaScript</span>
      <label class="switch">
        <input type="checkbox" id="toggleJavaScript">
        <span class="slider"></span>
      </label>
    </div>
  </section>

  <script src="../lib/marked.min.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
